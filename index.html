    }

    }
    :root {
      --bg: #f5f8fc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --line: #dbe5f1;
      --blue: #2563eb;
      --blue-dark: #0b1736;
      --green: #23884c;
      --shadow: 0 14px 34px rgba(15, 23, 42, .08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Manrope", Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 0, rgba(37, 99, 235, .16), transparent 32%),
        radial-gradient(circle at 90% 10%, rgba(56, 189, 248, .10), transparent 28%),
        linear-gradient(180deg, #f8fbff 0%, #eef4fb 100%);
      padding: 18px 14px;
    }

    .wrap {
      width: min(1540px, 100%);
      margin: 0 auto;
    }

    .hero {
      min-height: 112px;
      margin-bottom: 16px;
      border: 1px solid rgba(37, 99, 235, .18);
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.98), rgba(248,252,255,.96)),
        radial-gradient(circle at 88% 4%, rgba(37,99,235,.10), transparent 34%);
      box-shadow: 0 10px 28px rgba(15, 23, 42, .075), inset 0 -1px 0 rgba(37,99,235,.08);
      overflow: hidden;
      display: grid;
      grid-template-columns: auto minmax(360px, 1fr);
      gap: 28px;
      align-items: center;
      padding: 18px 28px;
      position: relative;
      color: #0c347a;
    }

    .hero::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 3px;
      background: linear-gradient(90deg, rgba(37,99,235,.14), rgba(37,99,235,.34), rgba(56,189,248,.16));
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 12% 0%, rgba(37,99,235,.08), transparent 28%),
        radial-gradient(circle at 68% 0%, rgba(56,189,248,.08), transparent 26%);
      pointer-events: none;
    }

    .brand-mark {
      width: 82px;
      height: 82px;
      border-radius: 50%;
      background: #fff;
      border: 1px solid rgba(37,99,235,.10);
      display: grid;
      place-items: center;
      z-index: 2;
      box-shadow: 0 14px 28px rgba(37,99,235,.10);
      overflow: hidden;
      flex: 0 0 auto;
    }

    .brand-mark img {
      width: 76px;
      height: 76px;
      display: block;
      object-fit: contain;
    }


    .hero-copy { z-index: 2; position: relative; }

    .hero h1 {
      margin: 0;
      font-size: clamp(38px, 3.55vw, 52px);
      line-height: .98;
      letter-spacing: -0.035em;
      font-weight: 800;
      color: #0b3477;
      text-transform: uppercase;
    }

    .hero p {
      margin: 8px 0 0;
      max-width: 760px;
      color: #153b73;
      font-size: 16px;
      line-height: 1.35;
      font-weight: 600;
    }


    .skyline {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: min(860px, 58%);
      height: 100%;
      z-index: 1;
      overflow: hidden;
      pointer-events: none;
      -webkit-mask-image: linear-gradient(90deg, transparent 0%, rgba(0,0,0,.18) 9%, #000 24%, #000 100%);
      mask-image: linear-gradient(90deg, transparent 0%, rgba(0,0,0,.18) 9%, #000 24%, #000 100%);
    }

    .skyline::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(248,252,255,.10) 45%, rgba(255,255,255,.18) 100%);
      z-index: 2;
      pointer-events: none;
    }

    .skyline img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: center bottom;
      filter: saturate(1.05) contrast(1.04);
      opacity: .96;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(410px, 43%) minmax(600px, 57%);
      gap: 16px;
      align-items: stretch;
    }

    .card {
      background: rgba(255, 255, 255, .96);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: 0 14px 38px rgba(15,23,42,.075);
      overflow: hidden;
    }

    .card-inner { padding: 20px; }

    .card-title {
      margin: 0 0 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--blue-dark);
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -.03em;
    }

    .card-title svg {
      width: 22px;
      height: 22px;
      color: var(--blue);
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .two {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .money-row {
      display: grid;
      grid-template-columns: 1fr 128px;
      gap: 10px;
    }

    label {
      display: block;
      margin: 0 0 6px;
      color: #334155;
      font-size: 13px;
      font-weight: 800;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 11px;
      background: #fff;
      color: #111827;
      font-size: 15px;
      outline: none;
      transition: border .16s, box-shadow .16s;
    }

    input, select {
      height: 44px;
      padding: 0 11px;
    }

    textarea {
      min-height: 92px;
      padding: 10px 11px;
      resize: vertical;
      line-height: 1.35;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37,99,235,.12);
    }

    .poa-fields {
      display: none;
      border: 1px dashed #cbd5e1;
      border-radius: 14px;
      padding: 12px;
      background: #f8fafc;
      gap: 10px;
    }

    .poa-fields.show {
      display: grid;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    button {
      min-height: 52px;
      border: 1px solid rgba(16, 82, 171, .22);
      border-radius: 10px;
      padding: 12px 20px;
      cursor: pointer;
      background: linear-gradient(180deg, rgba(255,255,255,.98), rgba(247,251,255,.96));
      color: #0b3477;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: .045em;
      text-transform: uppercase;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.9), 0 8px 18px rgba(15, 23, 42, .05);
      transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease, background .16s ease;
    }

    button svg {
      width: 24px;
      height: 24px;
      flex: 0 0 auto;
      display: block;
    }

    button.green {
      border-color: rgba(11, 52, 119, .28);
      background: linear-gradient(180deg, #145fc4 0%, #0b459d 48%, #08357e 100%);
      color: #fff;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.20), 0 12px 24px rgba(13, 71, 161, .24);
    }

    button.green .word-icon .doc { fill: rgba(255,255,255,.94); }
    button.green .word-icon .tile { fill: #ffffff; }
    button.green .word-icon .w { fill: #0c3f91; }
    button.reset svg { stroke: currentColor; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

    button:hover {
      transform: translateY(-1px);
      border-color: rgba(16,82,171,.32);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.9), 0 12px 24px rgba(15,23,42,.11);
    }

    button:active { transform: translateY(0); }

    .note {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 12.5px;
      line-height: 1.35;
    }

    .note svg {
      width: 16px;
      height: 16px;
      color: var(--green);
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      flex: 0 0 auto;
    }

    .preview-card {
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .preview-card .card-inner {
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .paper-stage {
      flex: 1;
      min-height: 0;
      border: 1px solid #dbe5f1;
      border-radius: 16px;
      background: linear-gradient(180deg, #edf3fb, #e7eef8);
      padding: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #previewCanvas {
      display: block;
      width: min(100%, 840px);
      height: auto;
      max-height: 100%;
      border-radius: 2px;
      background: white;
      box-shadow: 0 16px 38px rgba(15, 23, 42, .18);
    }

    .info {
      margin-top: 12px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      padding: 16px 20px;
      border-radius: 16px;
      background: rgba(255,255,255,.9);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .info-item {
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 10px;
      align-items: start;
      color: #475569;
      font-size: 13px;
      line-height: 1.35;
    }

    .info-icon {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #eef6ff;
      color: var(--blue);
      font-size: 18px;
      font-weight: 800;
    }

    .info strong {
      display: block;
      color: #0f172a;
      font-size: 14px;
      margin-bottom: 2px;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 14px 8px 2px;
      color: #64748b;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.35;
    }

    .footer-item {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .footer-mark {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #eef6ff;
      color: var(--blue);
      font-size: 18px;
      font-weight: 900;
      flex: 0 0 auto;
    }

    .footer-text { display: block; }

    @media (max-width: 620px) {
      .footer { align-items: flex-start; flex-direction: column; }
    }

    @media (max-width: 1120px) {
      .layout { grid-template-columns: 1fr; }
      .paper-stage { min-height: 760px; }
      .info { grid-template-columns: 1fr; }
      .hero { grid-template-columns: auto 1fr; min-height: 124px; }
      .skyline { display: none; }
      #previewCanvas { width: min(100%, 680px); }
    }

    @media (max-width: 620px) {
      body { padding: 10px; }
      .two, .money-row, .actions { grid-template-columns: 1fr; }
      .paper-stage { min-height: 520px; }
      .hero { padding: 12px; }
      .brand-mark { width: 64px; height: 64px; }
      .brand-mark img { width: 60px; height: 60px; }
      #previewCanvas { width: min(100%, 340px); }
    }
  </style>
</head>

<body>
  <main class="wrap">
    <section class="hero">
      <div class="brand-mark" aria-hidden="true">
        <img src="rr-logo.png" alt="">
      </div>
      <div class="hero-copy">
        <h1>Конструктор актов</h1>
        <p>для договоров Центрального офиса Русского Регистра</p>
      </div>
      <div class="skyline" aria-hidden="true">
        <img src="spb-silhouette.png" alt="">
      </div>
    </section>

    <div class="layout">
      <section class="card">
        <div class="card-inner">
          <h2 class="card-title">
            <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h8M8 17h8"/></svg>
            Данные
          </h2>

          <div class="form-grid">
            <div>
              <label for="executor">Исполнитель</label>
              <select id="executor">
                <option value="rr">Ассоциация Русский Регистр</option>
                <option value="rrPoa">Ассоциация Русский Регистр по доверенности</option>
                <option value="rrms">ООО «РР МС»</option>
                <option value="rrs">ООО «РРС»</option>
              </select>
            </div>

            <div class="poa-fields" id="poaFields">
              <div>
                <label for="assocPosition">Должность представителя Исполнителя</label>
                <input id="assocPosition" placeholder="например, директор по сертификации">
              </div>
              <div>
                <label for="assocName">И.О. Фамилия представителя Исполнителя</label>
                <input id="assocName" placeholder="И.И. Иванов">
              </div>
              <div>
                <label for="assocBasis">Основание полномочий представителя Исполнителя</label>
                <input id="assocBasis" placeholder="доверенность № ... от ...">
              </div>
            </div>

            <div class="two">
              <div>
                <label for="actDate">Дата акта</label>
                <input id="actDate" type="date">
              </div>
              <div>
                <label for="city">Место составления акта</label>
                <input id="city" placeholder="Санкт-Петербург">
              </div>
            </div>

            <div>
              <label for="customer">Краткое наименование Заказчика</label>
              <input id="customer" placeholder="ООО «Заказчик»">
            </div>

            <div class="two">
              <div>
                <label for="contractNumber">Номер договора</label>
                <input id="contractNumber" placeholder="026.119">
              </div>
              <div>
                <label for="contractDate">Дата заключения договора</label>
                <input id="contractDate" type="date">
              </div>
            </div>

            <div>
              <label for="customerPosition">Должность представителя Заказчика</label>
              <input id="customerPosition" placeholder="генеральный директор">
            </div>

            <div>
              <label for="customerName">И.О. Фамилия представителя Заказчика</label>
              <input id="customerName" placeholder="И.И. Иванов">
            </div>

            <div>
              <label for="customerBasis">Основание полномочий представителя Заказчика</label>
              <input id="customerBasis" placeholder="Устав / доверенность № ...">
            </div>

            <div>
              <label for="servicePlace">Место оказания услуг</label>
              <input id="servicePlace" placeholder="Санкт-Петербург, Россия">
            </div>

            <div class="money-row">
              <div>
                <label for="amount">Стоимость с НДС, руб.</label>
                <input id="amount" inputmode="decimal" placeholder="45000">
              </div>
              <div>
                <label for="vatShown">НДС</label>
                <input id="vatShown" readonly value="22%">
              </div>
            </div>

            <div>
              <label for="serviceName">Наименование оказанных услуг по договору</label>
              <textarea id="serviceName" placeholder="Введите наименование оказанных услуг"></textarea>
            </div>
          </div>

          <div class="actions">
            <button class="green" type="button" id="downloadDocxBtn" aria-label="Скачать DOCX">
              <svg class="word-icon" viewBox="0 0 32 32" aria-hidden="true">
                <path class="doc" d="M12 3h11l5 5v20H12z"/>
                <path d="M23 3v6h5" fill="none" stroke="rgba(12,63,145,.48)" stroke-width="1.5"/>
                <rect class="tile" x="4" y="8" width="15" height="16" rx="2.2"/>
                <path class="w" d="M7.1 12.2h2.1l1.1 6.1 1.5-6.1h2l1.4 6.1 1.1-6.1h2l-2 9.2h-2.1l-1.4-5.8-1.5 5.8H9.2z"/>
              </svg>
              <span>Скачать DOCX</span>

    const onesMale = ['', 'один', 'два', 'три', 'четыре', 'пять', 'шесть', 'семь', 'восемь', 'девять'];
    const onesFemale = ['', 'одна', 'две', 'три', 'четыре', 'пять', 'шесть', 'семь', 'восемь', 'девять'];
    const teens = ['десять', 'одиннадцать', 'двенадцать', 'тринадцать', 'четырнадцать', 'пятнадцать', 'шестнадцать', 'семнадцать', 'восемнадцать', 'девятнадцать'];
    const tens = ['', '', 'двадцать', 'тридцать', 'сорок', 'пятьдесят', 'шестьдесят', 'семьдесят', 'восемьдесят', 'девяносто'];
    const hundreds = ['', 'сто', 'двести', 'триста', 'четыреста', 'пятьсот', 'шестьсот', 'семьсот', 'восемьсот', 'девятьсот'];

    function plural(number, forms) {
      number = Math.abs(number) % 100;
      const n1 = number % 10;
      if (number > 10 && number < 20) return forms[2];
      if (n1 > 1 && n1 < 5) return forms[1];
      if (n1 === 1) return forms[0];
      return forms[2];
    }

    function triadToWords(number, gender) {
      const words = [];
      const h = Math.floor(number / 100);
      const t = Math.floor((number % 100) / 10);
      const o = number % 10;
      if (hundreds[h]) words.push(hundreds[h]);
      if (t === 1) {
        words.push(teens[o]);
      } else {
        if (tens[t]) words.push(tens[t]);
        const ones = gender === 'female' ? onesFemale : onesMale;
        if (ones[o]) words.push(ones[o]);
      }
      return words.join(' ');
    }

    function integerToWords(number) {
      if (number === 0) return 'ноль';
      const units = [
        { forms: ['', '', ''], gender: 'male' },
        { forms: ['тысяча', 'тысячи', 'тысяч'], gender: 'female' },
        { forms: ['миллион', 'миллиона', 'миллионов'], gender: 'male' },
        { forms: ['миллиард', 'миллиарда', 'миллиардов'], gender: 'male' },
        { forms: ['триллион', 'триллиона', 'триллионов'], gender: 'male' }
      ];
      const parts = [];
      let i = 0;
      while (number > 0 && i < units.length) {
        const triad = number % 1000;
        if (triad) {
          const words = triadToWords(triad, units[i].gender);
          const unit = units[i].forms[0] ? plural(triad, units[i].forms) : '';
          parts.unshift([words, unit].filter(Boolean).join(' '));
        }
        number = Math.floor(number / 1000);
        i++;
      }
      return parts.join(' ');
    }

    function cap(text) {

    function splitMoney(amount) {
      amount = round2(Math.max(0, amount));

      let kopecks = Math.round((amount - rubles) * 100);
      if (kopecks === 100) return { rubles: rubles + 1, kopecks: 0 };
      return { rubles, kopecks };
    }

    function moneyNumber(amount) {
      return new Intl.NumberFormat('ru-RU', {

    }

    function moneyWordsExcel(amount) {

    function setFont(size, weight = '400') {

    function drawText(text, x, y, opts = {}) {
      const size = opts.size || 18;
      const weight = opts.weight || '400';
      setFont(size, weight);
      ctx.fillStyle = '#000';
      ctx.textAlign = opts.align || 'left';
      ctx.textBaseline = opts.baseline || 'alphabetic';
      ctx.fillText(text, x, y);
    }

    function drawTextFit(text, x, y, maxWidth, opts = {}) {
      let size = opts.size || 18;
      const minSize = opts.minSize || 12;
      const weight = opts.weight || '400';
      const value = String(text || '');
      while (size > minSize) {
        setFont(size, weight);
        if (ctx.measureText(value).width <= maxWidth) break;
        size -= .5;
      }
      drawText(value, x, y, { ...opts, size, weight });
    }

    function wrapText(text, maxWidth, size = 18, weight = '400') {
      setFont(size, weight);
      const src = String(text || '').trim();
      if (!src) return [''];
      const paragraphs = src.split(/\n+/);
      const lines = [];

      for (const paragraph of paragraphs) {
        const words = paragraph.replace(/\s+/g, ' ').trim().split(' ');
        let line = '';
        for (const word of words) {
          const test = line ? `${line} ${word}` : word;
          if (ctx.measureText(test).width <= maxWidth || !line) {
            line = test;
          } else {
            lines.push(line);
            line = word;
          }
        }
        if (line) lines.push(line);
      }

      return lines;
    }

    function getWrappedLinesFitting(text, maxWidth, maxLines, startSize, minSize, weight = '400') {
      let size = startSize;
      let lines = wrapText(text, maxWidth, size, weight);

      while (lines.length > maxLines && size > minSize) {
        size -= 0.5;
        lines = wrapText(text, maxWidth, size, weight);
      }

      if (lines.length > maxLines) {
        lines = lines.slice(0, maxLines);
        const last = lines[maxLines - 1];
        let trimmed = last;
        setFont(size, weight);
        while (trimmed.length > 4 && ctx.measureText(trimmed + '…').width > maxWidth) {
          trimmed = trimmed.slice(0, -1);
        }
        lines[maxLines - 1] = trimmed + '…';
      }

      return { lines, size };
    }

    function drawWrapped(text, x, y, maxWidth, lineHeight, opts = {}) {
      const lines = wrapText(text, maxWidth, opts.size || 18, opts.weight || '400');
      lines.forEach((line, i) => drawText(line, x, y + i * lineHeight, opts));
      return y + lines.length * lineHeight;
    }

    function drawWrappedFitted(text, x, y, maxWidth, maxLines, startSize, minSize, lineHeightFactor, weight = '400') {
      const fit = getWrappedLinesFitting(text, maxWidth, maxLines, startSize, minSize, weight);
      const lineHeight = fit.size * lineHeightFactor;
      fit.lines.forEach((line, i) => drawText(line, x, y + i * lineHeight, { size: fit.size, weight }));
      return y + fit.lines.length * lineHeight;
    }

    function drawCenteredLines(lines, y, size, weight = '700') {

    function makePdfFromJpegDataUrl(jpegDataUrl, width, height) {
      const jpegBinary = atob(jpegDataUrl.split(',')[1]);
      const imgBytes = new Uint8Array(jpegBinary.length);
      for (let i = 0; i < jpegBinary.length; i++) imgBytes[i] = jpegBinary.charCodeAt(i);

      const pageW = 595.28;
      const pageH = 841.89;
      const parts = [];
      const offsets = [];
      let length = 0;

      function addString(str) {
        const bytes = new TextEncoder().encode(str);
        parts.push(bytes);
        length += bytes.length;
      }

      function addBytes(bytes) {
        parts.push(bytes);
        length += bytes.length;
      }

      function obj(n, bodyFn) {
        offsets[n] = length;
        addString(`${n} 0 obj\n`);
        bodyFn();
        addString('\nendobj\n');
      }

      addString('%PDF-1.4\n%\xE2\xE3\xCF\xD3\n');
      obj(1, () => addString('<< /Type /Catalog /Pages 2 0 R >>'));
      obj(2, () => addString('<< /Type /Pages /Kids [3 0 R] /Count 1 >>'));
      obj(3, () => addString(`<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${pageW} ${pageH}] /Resources << /XObject << /Im0 4 0 R >> >> /Contents 5 0 R >>`));
      obj(4, () => {
        addString(`<< /Type /XObject /Subtype /Image /Width ${width} /Height ${height} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${imgBytes.length} >>\nstream\n`);
        addBytes(imgBytes);
        addString('\nendstream');
      });
      const content = `q\n${pageW} 0 0 ${pageH} 0 0 cm\n/Im0 Do\nQ`;
      obj(5, () => addString(`<< /Length ${content.length} >>\nstream\n${content}\nendstream`));
      const xrefOffset = length;
      addString('xref\n0 6\n0000000000 65535 f \n');
      for (let i = 1; i <= 5; i++) addString(String(offsets[i]).padStart(10, '0') + ' 00000 n \n');
      addString(`trailer\n<< /Size 6 /Root 1 0 R >>\nstartxref\n${xrefOffset}\n%%EOF`);
      return new Blob(parts, { type: 'application/pdf' });
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 800);
    }

    function downloadPdf() {

    function xmlEscape(value) {
      return String(value ?? '').replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&apos;'
      }[char]));
    }

    function safeFilePart(value, fallback = 'akt') {
      return String(value || fallback).trim().replace(/[^a-zA-Z0-9а-яА-Я._-]/g, '_') || fallback;
    }

    function makeCrcTable() {
      const table = new Uint32Array(256);
      for (let n = 0; n < 256; n++) {
        let c = n;
        for (let k = 0; k < 8; k++) c = (c & 1) ? (0xedb88320 ^ (c >>> 1)) : (c >>> 1);
        table[n] = c >>> 0;
      }
      return table;
    }

    const crcTable = makeCrcTable();

    function crc32(bytes) {
      let c = 0xffffffff;
      for (let i = 0; i < bytes.length; i++) c = crcTable[(c ^ bytes[i]) & 0xff] ^ (c >>> 8);
      return (c ^ 0xffffffff) >>> 0;
    }

    function dosDateTime(date = new Date()) {
      const time = (date.getHours() << 11) | (date.getMinutes() << 5) | Math.floor(date.getSeconds() / 2);
      const day = Math.max(1, date.getDate());
      const month = date.getMonth() + 1;
      const year = Math.max(1980, date.getFullYear()) - 1980;
      return { time, date: (year << 9) | (month << 5) | day };
    }

    function pushU16(arr, value) { arr.push(value & 255, (value >>> 8) & 255); }
    function pushU32(arr, value) { arr.push(value & 255, (value >>> 8) & 255, (value >>> 16) & 255, (value >>> 24) & 255); }

    function makeZip(files) {
      const encoder = new TextEncoder();
      const chunks = [];
      const central = [];
      let offset = 0;
      const stamp = dosDateTime();

      files.forEach(file => {
        const nameBytes = encoder.encode(file.name);
        const dataBytes = encoder.encode(file.content);
        const crc = crc32(dataBytes);
        const local = [];
        pushU32(local, 0x04034b50);
        pushU16(local, 20);
        pushU16(local, 0x0800);
        pushU16(local, 0);
        pushU16(local, stamp.time);
        pushU16(local, stamp.date);
        pushU32(local, crc);
        pushU32(local, dataBytes.length);
        pushU32(local, dataBytes.length);
        pushU16(local, nameBytes.length);
        pushU16(local, 0);
        chunks.push(new Uint8Array(local), nameBytes, dataBytes);

        const c = [];
        pushU32(c, 0x02014b50);
        pushU16(c, 20);
        pushU16(c, 20);
        pushU16(c, 0x0800);
        pushU16(c, 0);
        pushU16(c, stamp.time);
        pushU16(c, stamp.date);
        pushU32(c, crc);
        pushU32(c, dataBytes.length);
        pushU32(c, dataBytes.length);
        pushU16(c, nameBytes.length);
        pushU16(c, 0);
        pushU16(c, 0);
        pushU16(c, 0);
        pushU16(c, 0);
        pushU32(c, 0);
        pushU32(c, offset);
        central.push(new Uint8Array(c), nameBytes);
        offset += local.length + nameBytes.length + dataBytes.length;
      });

      const centralOffset = offset;
      const centralSize = central.reduce((sum, part) => sum + part.length, 0);
      const end = [];
      pushU32(end, 0x06054b50);
      pushU16(end, 0);
      pushU16(end, 0);
      pushU16(end, files.length);
      pushU16(end, files.length);
      pushU32(end, centralSize);
      pushU32(end, centralOffset);
      pushU16(end, 0);
      return new Blob([...chunks, ...central, new Uint8Array(end)], { type: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
    }

    function wText(value) {
      return `<w:r><w:t xml:space="preserve">${xmlEscape(value)}</w:t></w:r>`;
    }

    function wRun(value, bold = false) {
      return `<w:r>${bold ? '<w:rPr><w:b/></w:rPr>' : ''}<w:t xml:space="preserve">${xmlEscape(value)}</w:t></w:r>`;
    }

    function wRunStyled(value, opts = {}) {
      const size = opts.size || 22;
      const bold = opts.bold ? '<w:b/>' : '';
      const underline = opts.underline ? '<w:u w:val="single"/>' : '';
      return `<w:r><w:rPr><w:rFonts w:ascii="Tahoma" w:hAnsi="Tahoma" w:cs="Tahoma"/><w:sz w:val="${size}"/><w:szCs w:val="${size}"/>${bold}${underline}</w:rPr><w:t xml:space="preserve">${xmlEscape(value)}</w:t></w:r>`;
    }

    function wParagraphRuns(runs, opts = {}) {
      const align = opts.align ? `<w:jc w:val="${opts.align}"/>` : '';
      const spacing = `<w:spacing w:before="${opts.before || 0}" w:after="${opts.after ?? 80}" w:line="${opts.line || 240}" w:lineRule="auto"/>`;
      const indent = opts.indent ? `<w:ind w:firstLine="${opts.indent}"/>` : '';
      return `<w:p><w:pPr>${align}${spacing}${indent}</w:pPr>${runs.join('')}</w:p>`;
    }

    function wParagraph(text, opts = {}) {
      const align = opts.align ? `<w:jc w:val="${opts.align}"/>` : '';
      const spacing = `<w:spacing w:before="${opts.before || 0}" w:after="${opts.after ?? 80}" w:line="${opts.line || 240}" w:lineRule="auto"/>`;
      const indent = opts.indent ? `<w:ind w:firstLine="${opts.indent}"/>` : '';
      const size = opts.size || 22;
      const bold = opts.bold ? '<w:b/>' : '';
      const children = String(text || '').split('\n').map((part, i) => `${i ? '<w:br/>' : ''}<w:t xml:space="preserve">${xmlEscape(part)}</w:t>`).join('');
      return `<w:p><w:pPr>${align}${spacing}${indent}<w:rPr><w:rFonts w:ascii="Tahoma" w:hAnsi="Tahoma" w:cs="Tahoma"/><w:sz w:val="${size}"/><w:szCs w:val="${size}"/>${bold}</w:rPr></w:pPr><w:r><w:rPr><w:rFonts w:ascii="Tahoma" w:hAnsi="Tahoma" w:cs="Tahoma"/><w:sz w:val="${size}"/><w:szCs w:val="${size}"/>${bold}</w:rPr>${children}</w:r></w:p>`;
    }

    function lineCell(text = '', width = 2500, align = 'center') {
      return `<w:tc><w:tcPr><w:tcW w:w="${width}" w:type="dxa"/><w:tcBorders><w:top w:val="nil"/><w:left w:val="nil"/><w:bottom w:val="single" w:sz="8" w:space="0" w:color="000000"/><w:right w:val="nil"/></w:tcBorders></w:tcPr>${wParagraph(text, { align, after: 0, line: 220, size: 22 })}</w:tc>`;
    }

    function plainCell(content, width, align = 'left') {
      const body = Array.isArray(content) ? content.join('') : wParagraph(content, { align, after: 0, line: 220, size: 22 });
      return `<w:tc><w:tcPr><w:tcW w:w="${width}" w:type="dxa"/><w:tcBorders><w:top w:val="nil"/><w:left w:val="nil"/><w:bottom w:val="nil"/><w:right w:val="nil"/></w:tcBorders></w:tcPr>${body}</w:tc>`;
    }

    function makeActDocxXml() {
      const ex = getExecutor();
      const total = round2(parseAmount(fields.amount.value));
      const vat = calculateVatIncluded(total, ex.vatRate);
      const signer = typeof ex.signName === 'function' ? ex.signName() : ex.signName;
      const customerName = v('customerName', '________________');
      const service = v('serviceName', '');
      const intro = `Мы, нижеподписавшиеся, ${ex.intro()}, с одной стороны, и представитель Заказчика, ${v('customerPosition', '________________')} ${v('customer', '________________')} ${customerName}, действующий на основании ${v('customerBasis', '________________')}, с другой стороны, составили настоящий Акт в том, что в соответствии с договором №${v('contractNumber', '________')} от ${dateRu(fields.contractDate.value)} г.`;
      const money = `${moneyWordsExcel(total)}, в том числе НДС ${ex.vatRate}% - ${moneyWordsExcel(vat)}`;
      const serviceParas = service ? service.split('\n').map(part => wParagraph(part, { align: 'both', after: 30, line: 215, size: 20 })).join('') : wParagraph('', { after: 0, size: 20 });

      return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">
<w:body>
${wParagraph('АКТ сдачи-приемки оказанных услуг', { align: 'center', bold: true, after: 0, line: 210, size: 21 })}
${wParagraph(`по договору №${v('contractNumber', '________')} от ${dateRu(fields.contractDate.value)} г. между`, { align: 'center', bold: true, after: 0, line: 210, size: 21 })}
${wParagraph(ex.headerName, { align: 'center', bold: true, after: 0, line: 210, size: 21 })}
${wParagraph(ex.genderLine, { align: 'center', bold: true, after: 0, line: 210, size: 21 })}
${wParagraph(`${v('customer', '________________')},`, { align: 'center', bold: true, after: 0, line: 210, size: 21 })}
${wParagraph('именуемым в дальнейшем «Заказчик»', { align: 'center', bold: true, after: 220, line: 210, size: 21 })}
<w:tbl><w:tblPr><w:tblW w:w="10000" w:type="dxa"/><w:tblLayout w:type="fixed"/><w:tblBorders><w:top w:val="nil"/><w:left w:val="nil"/><w:bottom w:val="nil"/><w:right w:val="nil"/><w:insideH w:val="nil"/><w:insideV w:val="nil"/></w:tblBorders></w:tblPr><w:tr>${lineCell(v('city', '________________'), 3600)}${plainCell('', 2600)}${lineCell(dateRu(fields.actDate.value), 2800)}</w:tr></w:tbl>
${wParagraph(intro, { align: 'both', indent: 567, before: 180, after: 120, line: 220, size: 20 })}
${wParagraphRuns([wRunStyled('Исполнитель ', { size: 20 }), wRunStyled('                 оказал                 ', { size: 20, underline: true }), wRunStyled(' порученные ему Заказчиком услуги:', { size: 20 })], { after: 70, line: 220 })}
${serviceParas}
<w:p><w:pPr><w:pBdr><w:bottom w:val="single" w:sz="8" w:space="1" w:color="000000"/></w:pBdr><w:spacing w:after="120"/></w:pPr></w:p>
${wParagraphRuns([wRunStyled('Услуги оказаны ', { size: 20 }), wRunStyled('          в срок          ', { size: 20, underline: true }), wRunStyled(', Заказчик ', { size: 20 }), wRunStyled('          принял          ', { size: 20, underline: true }), wRunStyled(' указанные услуги к оплате.', { size: 20 })], { after: 100, line: 220 })}
${wParagraphRuns([wRunStyled('Место оказания ', { size: 20 }), wRunStyled('                                      ' + v('servicePlace', '________________') + '                                      ', { size: 20, underline: true })], { after: 100, line: 220 })}
${wParagraphRuns([wRunStyled('Рекламации ', { size: 20 }), wRunStyled('                                      отсутствуют                                      ', { size: 20, underline: true })], { after: 180, line: 220 })}
${wParagraph('Расчёты между сторонами урегулированы, услуги оказаны на сумму:', { after: 70, line: 220, size: 20 })}
${wParagraph(money, { bold: true, align: 'both', after: 170, line: 220, size: 20 })}
${wParagraph('Настоящий Акт является основанием для взаиморасчетов.', { after: 110, line: 220, size: 20 })}
${wParagraph('Настоящий Акт составлен в двух экземплярах, по одному для каждой стороны.', { after: 320, line: 220, size: 20 })}
<w:tbl><w:tblPr><w:tblW w:w="10000" w:type="dxa"/><w:tblLayout w:type="fixed"/><w:tblBorders><w:top w:val="nil"/><w:left w:val="nil"/><w:bottom w:val="nil"/><w:right w:val="nil"/><w:insideH w:val="nil"/><w:insideV w:val="nil"/></w:tblBorders></w:tblPr>
<w:tr>${plainCell([wParagraph('Заказчик:', { align: 'center', bold: true, after: 360, line: 220, size: 20 })], 4700)}${plainCell('', 600)}${plainCell([wParagraph('Исполнитель:', { align: 'center', bold: true, after: 360, line: 220, size: 20 })], 4700)}</w:tr>
<w:tr>${plainCell([wParagraph('________________________ /' + customerName + '/', { align: 'center', after: 0, line: 220, size: 20 })], 4700)}${plainCell('', 600)}${plainCell([wParagraph('________________________ /' + signer + '/', { align: 'center', after: 0, line: 220, size: 20 })], 4700)}</w:tr>
</w:tbl>
<w:sectPr><w:pgSz w:w="11906" w:h="16838"/><w:pgMar w:top="737" w:right="851" w:bottom="567" w:left="851" w:header="0" w:footer="0" w:gutter="0"/></w:sectPr>
</w:body></w:document>`;
    }

    function makeDocxBlob() {
      const documentXml = makeActDocxXml();
      const stylesXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><w:styles xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"><w:style w:type="paragraph" w:default="1" w:styleId="Normal"><w:name w:val="Normal"/><w:rPr><w:rFonts w:ascii="Tahoma" w:hAnsi="Tahoma" w:cs="Tahoma"/><w:sz w:val="22"/><w:szCs w:val="22"/></w:rPr></w:style></w:styles>`;
      const settingsXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><w:settings xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"><w:zoom w:percent="100"/><w:defaultTabStop w:val="708"/></w:settings>`;
      return makeZip([
        { name: '[Content_Types].xml', content: `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/><Override PartName="/word/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.styles+xml"/><Override PartName="/word/settings.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.settings+xml"/></Types>` },
        { name: '_rels/.rels', content: `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/></Relationships>` },
        { name: 'word/_rels/document.xml.rels', content: `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rIdStyles" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/><Relationship Id="rIdSettings" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/settings" Target="settings.xml"/></Relationships>` },
        { name: 'word/document.xml', content: documentXml },
        { name: 'word/styles.xml', content: stylesXml },
        { name: 'word/settings.xml', content: settingsXml }
      ]);
    }

    function downloadDocx() {
      render();
      const docxBlob = makeDocxBlob();
      const contract = safeFilePart(v('contractNumber', 'akt'));
      downloadBlob(docxBlob, `akt_${contract}.docx`);
    }

    function resetForm() {
      localStorage.removeItem(storageKey);
      hasUserInput = false;
      Object.keys(fields).forEach(key => {
        if (fields[key].tagName === 'SELECT') fields[key].selectedIndex = 0;
        else fields[key].value = '';
      });
      render();
    }

    Object.values(fields).forEach(field => {
      field.addEventListener('input', () => {
        hasUserInput = true;
        render();
      });
      field.addEventListener('change', () => {
        hasUserInput = true;
        render();
      });
    });

    document.getElementById('downloadDocxBtn').addEventListener('click', downloadDocx);
    document.getElementById('resetBtn').addEventListener('click', resetForm);

    loadSettings();
    render();
  </script>
</body>
</html>
