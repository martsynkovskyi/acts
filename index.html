    :root {
      --bg: #f5f8fc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --line: #dbe5f1;
      --blue: #2563eb;
      --blue-dark: #0b1736;
      --green: #23884c;
      --shadow: 0 14px 34px rgba(15, 23, 42, .08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Manrope", Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 0, rgba(37, 99, 235, .16), transparent 32%),
        radial-gradient(circle at 90% 10%, rgba(56, 189, 248, .10), transparent 28%),
        linear-gradient(180deg, #f8fbff 0%, #eef4fb 100%);
      padding: 18px 14px;
    }

    .wrap {
      width: min(1540px, 100%);
      margin: 0 auto;
    }

    .hero {
      min-height: 112px;
      margin-bottom: 16px;
      border: 1px solid rgba(37, 99, 235, .18);
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.98), rgba(248,252,255,.96)),
        radial-gradient(circle at 88% 4%, rgba(37,99,235,.10), transparent 34%);
      box-shadow: 0 10px 28px rgba(15, 23, 42, .075), inset 0 -1px 0 rgba(37,99,235,.08);
      overflow: hidden;
      display: grid;
      grid-template-columns: auto minmax(360px, 1fr);
      gap: 28px;
      align-items: center;
      padding: 18px 28px;
      position: relative;
      color: #0c347a;
    }

    .hero::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 3px;
      background: linear-gradient(90deg, rgba(37,99,235,.14), rgba(37,99,235,.34), rgba(56,189,248,.16));
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 12% 0%, rgba(37,99,235,.08), transparent 28%),
        radial-gradient(circle at 68% 0%, rgba(56,189,248,.08), transparent 26%);
      pointer-events: none;
    }

    .brand-mark {
      width: 82px;
      height: 82px;
      border-radius: 50%;
      background: #fff;
      border: 1px solid rgba(37,99,235,.10);
      display: grid;
      place-items: center;
      z-index: 2;
      box-shadow: 0 14px 28px rgba(37,99,235,.10);
      overflow: hidden;
      flex: 0 0 auto;
    }

    .brand-mark img {
      width: 76px;
      height: 76px;
      display: block;
      object-fit: contain;
    }


    .hero-copy { z-index: 2; position: relative; }

    .hero h1 {
      margin: 0;
      font-size: clamp(38px, 3.55vw, 52px);
      line-height: .98;
      letter-spacing: -0.035em;
      font-weight: 800;
      color: #0b3477;
      text-transform: uppercase;
    }

    .hero p {
      margin: 8px 0 0;
      max-width: 760px;
      color: #153b73;
      font-size: 16px;
      line-height: 1.35;
      font-weight: 600;
    }


    .skyline {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: min(860px, 58%);
      height: 100%;
      z-index: 1;
      overflow: hidden;
      pointer-events: none;
      -webkit-mask-image: linear-gradient(90deg, transparent 0%, rgba(0,0,0,.18) 9%, #000 24%, #000 100%);
      mask-image: linear-gradient(90deg, transparent 0%, rgba(0,0,0,.18) 9%, #000 24%, #000 100%);
    }

    .skyline::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(255,255,255,.92) 0%, rgba(255,255,255,.54) 14%, rgba(248,252,255,.16) 38%, rgba(255,255,255,.18) 100%),
        linear-gradient(180deg, rgba(255,255,255,.38), rgba(255,255,255,.10) 48%, rgba(255,255,255,.42));
      z-index: 2;
      pointer-events: none;
    }

    .skyline img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: center center;
      filter: saturate(1.02) contrast(1.01);
      opacity: .92;
      mix-blend-mode: multiply;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(410px, 43%) minmax(600px, 57%);
      gap: 16px;
      align-items: stretch;
    }

    .card {
      background: rgba(255, 255, 255, .96);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: 0 14px 38px rgba(15,23,42,.075);
      overflow: hidden;
    }

    .card-inner { padding: 20px; }

    .card-title {
      margin: 0 0 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--blue-dark);
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -.03em;
    }

    .card-title svg {
      width: 22px;
      height: 22px;
      color: var(--blue);
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .two {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .money-row {
      display: grid;
      grid-template-columns: 1fr 128px;
      gap: 10px;
    }

    label {
      display: block;
      margin: 0 0 6px;
      color: #334155;
      font-size: 13px;
      font-weight: 800;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 11px;
      background: #fff;
      color: #111827;
      font-size: 15px;
      outline: none;
      transition: border .16s, box-shadow .16s;
    }

    input, select {
      height: 44px;
      padding: 0 11px;
    }

    textarea {
      min-height: 92px;
      padding: 10px 11px;
      resize: vertical;
      line-height: 1.35;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37,99,235,.12);
    }

    .poa-fields {
      display: none;
      border: 1px dashed #cbd5e1;
      border-radius: 14px;
      padding: 12px;
      background: #f8fafc;
      gap: 10px;
    }

    .poa-fields.show {
      display: grid;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    button {
      min-height: 52px;
      border: 1px solid rgba(16, 82, 171, .22);
      border-radius: 10px;
      padding: 12px 20px;
      cursor: pointer;
      background: linear-gradient(180deg, rgba(255,255,255,.98), rgba(247,251,255,.96));
      color: #0b3477;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: .045em;
      text-transform: uppercase;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.9), 0 8px 18px rgba(15, 23, 42, .05);
      transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease, background .16s ease;
    }

    button svg {
      width: 24px;
      height: 24px;
      flex: 0 0 auto;
      display: block;
    }

    button.green {
      border-color: rgba(21, 128, 61, .36);
      background: linear-gradient(180deg, #1fb85a 0%, #168a43 48%, #0f6a32 100%);
      color: #fff;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.24), 0 12px 24px rgba(22, 163, 74, .25);
    }

    button.green:hover {
      border-color: rgba(21, 128, 61, .52);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.24), 0 14px 28px rgba(22, 163, 74, .32);
    }

    button.green .excel-icon .doc { fill: rgba(255,255,255,.94); }
    button.green .excel-icon .tile { fill: #ffffff; }
    button.green .excel-icon .x { fill: #107c41; }
    button.reset svg { stroke: currentColor; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

    button:hover {
      transform: translateY(-1px);
      border-color: rgba(16,82,171,.32);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.9), 0 12px 24px rgba(15,23,42,.11);
    }

    button:active { transform: translateY(0); }

    .note {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 12.5px;
      line-height: 1.35;
    }

    .note svg {
      width: 16px;
      height: 16px;
      color: var(--green);
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      flex: 0 0 auto;
    }

    .preview-card {
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .preview-card .card-inner {
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .paper-stage {
      flex: 1;
      min-height: 0;
      border: 1px solid #dbe5f1;
      border-radius: 16px;
      background: linear-gradient(180deg, #edf3fb, #e7eef8);
      padding: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #previewCanvas {
      display: block;
      width: min(100%, 840px);
      height: auto;
      max-height: 100%;
      border-radius: 2px;
      background: white;
      box-shadow: 0 16px 38px rgba(15, 23, 42, .18);
    }

    .info {
      margin-top: 12px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      padding: 16px 20px;
      border-radius: 16px;
      background: rgba(255,255,255,.9);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .info-item {
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 10px;
      align-items: start;
      color: #475569;
      font-size: 13px;
      line-height: 1.35;
    }

    .info-icon {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #eef6ff;
      color: var(--blue);
      font-size: 18px;
      font-weight: 800;
    }

    .info strong {
      display: block;
      color: #0f172a;
      font-size: 14px;
      margin-bottom: 2px;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 14px 8px 2px;
      color: #64748b;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.35;
    }

    .footer-item {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .footer-mark {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #eef6ff;
      color: var(--blue);
      font-size: 18px;
      font-weight: 900;
      flex: 0 0 auto;
    }

    .footer-text { display: block; }

    @media (max-width: 620px) {
      .footer { align-items: flex-start; flex-direction: column; }
    }

    @media (max-width: 1120px) {
      .layout { grid-template-columns: 1fr; }
      .paper-stage { min-height: 760px; }
      .info { grid-template-columns: 1fr; }
      .hero { grid-template-columns: auto 1fr; min-height: 124px; }
      .skyline { display: none; }
      #previewCanvas { width: min(100%, 680px); }
    }

    @media (max-width: 620px) {
      body { padding: 10px; }
      .two, .money-row, .actions { grid-template-columns: 1fr; }
      .paper-stage { min-height: 520px; }
      .hero { padding: 12px; }
      .brand-mark { width: 64px; height: 64px; }
      .brand-mark img { width: 60px; height: 60px; }
      #previewCanvas { width: min(100%, 340px); }
    }
  
    /* === v26 responsive polish: desktop / tablet / mobile === */
    html {
      -webkit-text-size-adjust: 100%;

    }

    .wrap {
      max-width: 1540px;
    }

    input, select, textarea, button {

      min-height: clamp(680px, calc(100vh - 230px), 1040px);

    #previewCanvas {
      width: min(100%, 820px);

      .layout { grid-template-columns: minmax(430px, 40%) minmax(720px, 60%); }
      .paper-stage { min-height: 900px; }
      #previewCanvas { width: min(100%, 900px); max-height: 980px; }

      .card-inner { padding: 18px; }
      .paper-stage { min-height: 720px; }
      #previewCanvas { width: min(100%, 720px); max-height: 760px; }

  <script>
    const storageKey = 'actsGeneratorSettingsV9';
    const canvas = document.getElementById('previewCanvas');
    const ctx = canvas.getContext('2d');

    const fields = {
      executor: document.getElementById('executor'),
      assocPosition: document.getElementById('assocPosition'),
      assocName: document.getElementById('assocName'),
      assocBasis: document.getElementById('assocBasis'),
      actDate: document.getElementById('actDate'),
      city: document.getElementById('city'),
      customer: document.getElementById('customer'),
      contractNumber: document.getElementById('contractNumber'),
      contractDate: document.getElementById('contractDate'),
      customerPosition: document.getElementById('customerPosition'),
      customerName: document.getElementById('customerName'),
      customerBasis: document.getElementById('customerBasis'),
      servicePlace: document.getElementById('servicePlace'),
      amount: document.getElementById('amount'),
      serviceName: document.getElementById('serviceName')
    };

    const poaFields = document.getElementById('poaFields');
    const vatShown = document.getElementById('vatShown');
    let hasUserInput = false;

    const executorData = {
      rr: {
        headerName: 'Ассоциацией по сертификации "Русский Регистр",',
        genderLine: 'именуемой в дальнейшем «Исполнитель», и',
        intro: () => 'представитель Исполнителя, генеральный директор Ассоциации по сертификации "Русский Регистр" А.В. Владимирцев, действующий на основании Устава',
        signName: 'А.В. Владимирцев',
        vatRate: 22
      },
      rrPoa: {
        headerName: 'Ассоциацией по сертификации "Русский Регистр",',
        genderLine: 'именуемой в дальнейшем «Исполнитель», и',
        intro: () => `представитель Исполнителя, ${v('assocPosition', '________________')} Ассоциации по сертификации "Русский Регистр" ${v('assocName', '________________')}, действующий на основании ${v('assocBasis', '________________')}`,
        signName: () => v('assocName', '________________'),
        vatRate: 22
      },
      rrms: {
        headerName: 'ООО «РР МС»,',
        genderLine: 'именуемым в дальнейшем «Исполнитель», и',
        intro: () => 'представитель Исполнителя, генеральный директор ООО "РР МС" Е.А. Владимирцева, действующая на основании Устава',
        signName: 'Е.А. Владимирцева',
        vatRate: 5
      },
      rrs: {
        headerName: 'ООО «РРС»,',
        genderLine: 'именуемым в дальнейшем «Исполнитель», и',
        intro: () => 'представитель Исполнителя, генеральный директор ООО "РРС" А.В. Владимирцев, действующий на основании Устава',
        signName: 'А.В. Владимирцев',
        vatRate: 5
      }
    };

    function v(key, fallback = '') {
      return fields[key].value.trim() || fallback;
    }

    function dateRu(value) {
      if (!value) return '__.__.____';
      const [year, month, day] = value.split('-');
      return `${day}.${month}.${year}`;
    }

    function parseAmount(value) {
      const normalized = String(value).replace(/\s/g, '').replace(',', '.').replace(/[^0-9.]/g, '');
      const number = Number(normalized);
      return Number.isFinite(number) ? number : 0;
    }

    function round2(number) {
      return Math.round((number + Number.EPSILON) * 100) / 100;
    }

    const onesMale = ['', 'один', 'два', 'три', 'четыре', 'пять', 'шесть', 'семь', 'восемь', 'девять'];
    const onesFemale = ['', 'одна', 'две', 'три', 'четыре', 'пять', 'шесть', 'семь', 'восемь', 'девять'];
    const teens = ['десять', 'одиннадцать', 'двенадцать', 'тринадцать', 'четырнадцать', 'пятнадцать', 'шестнадцать', 'семнадцать', 'восемнадцать', 'девятнадцать'];
    const tens = ['', '', 'двадцать', 'тридцать', 'сорок', 'пятьдесят', 'шестьдесят', 'семьдесят', 'восемьдесят', 'девяносто'];
    const hundreds = ['', 'сто', 'двести', 'триста', 'четыреста', 'пятьсот', 'шестьсот', 'семьсот', 'восемьсот', 'девятьсот'];

    function plural(number, forms) {
      number = Math.abs(number) % 100;
      const n1 = number % 10;
      if (number > 10 && number < 20) return forms[2];
      if (n1 > 1 && n1 < 5) return forms[1];
      if (n1 === 1) return forms[0];
      return forms[2];
    }

    function triadToWords(number, gender) {
      const words = [];
      const h = Math.floor(number / 100);
      const t = Math.floor((number % 100) / 10);
      const o = number % 10;
      if (hundreds[h]) words.push(hundreds[h]);
      if (t === 1) {
        words.push(teens[o]);
      } else {
        if (tens[t]) words.push(tens[t]);
        const ones = gender === 'female' ? onesFemale : onesMale;
        if (ones[o]) words.push(ones[o]);
      }
      return words.join(' ');
    }

    function integerToWords(number) {
      if (number === 0) return 'ноль';
      const units = [
        { forms: ['', '', ''], gender: 'male' },
        { forms: ['тысяча', 'тысячи', 'тысяч'], gender: 'female' },
        { forms: ['миллион', 'миллиона', 'миллионов'], gender: 'male' },
        { forms: ['миллиард', 'миллиарда', 'миллиардов'], gender: 'male' },
        { forms: ['триллион', 'триллиона', 'триллионов'], gender: 'male' }
      ];
      const parts = [];
      let i = 0;
      while (number > 0 && i < units.length) {
        const triad = number % 1000;
        if (triad) {
          const words = triadToWords(triad, units[i].gender);
          const unit = units[i].forms[0] ? plural(triad, units[i].forms) : '';
          parts.unshift([words, unit].filter(Boolean).join(' '));
        }
        number = Math.floor(number / 1000);
        i++;
      }
      return parts.join(' ');
    }

    function cap(text) {
      return text.charAt(0).toUpperCase() + text.slice(1);
    }

    function splitMoney(amount) {
      amount = round2(Math.max(0, amount));
      const rubles = Math.floor(amount);
      let kopecks = Math.round((amount - rubles) * 100);
      if (kopecks === 100) return { rubles: rubles + 1, kopecks: 0 };
      return { rubles, kopecks };
    }

    function moneyNumber(amount) {
      return new Intl.NumberFormat('ru-RU', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      }).format(round2(amount)).replace(/\u00A0/g, ' ');
    }

    function moneyWordsExcel(amount) {
      const { rubles, kopecks } = splitMoney(amount);
      return `${moneyNumber(amount)} (${cap(integerToWords(rubles))}) руб. ${String(kopecks).padStart(2, '0')} коп.`;
    }

    function calculateVatIncluded(total, rate) {
      return round2(total * rate / (100 + rate));
    }

    function getExecutor() {
      return executorData[fields.executor.value] || executorData.rr;
    }

    function setFont(size, weight = '400') {
      ctx.font = `${weight} ${size}px Tahoma, Arial, sans-serif`;
    }

    function drawText(text, x, y, opts = {}) {
      const size = opts.size || 18;
      const weight = opts.weight || '400';
      setFont(size, weight);
      ctx.fillStyle = '#000';
      ctx.textAlign = opts.align || 'left';
      ctx.textBaseline = opts.baseline || 'alphabetic';
      ctx.fillText(text, x, y);
    }

    function drawTextFit(text, x, y, maxWidth, opts = {}) {
      let size = opts.size || 18;
      const minSize = opts.minSize || 12;
      const weight = opts.weight || '400';
      const value = String(text || '');
      while (size > minSize) {
        setFont(size, weight);
        if (ctx.measureText(value).width <= maxWidth) break;
        size -= .5;
      }
      drawText(value, x, y, { ...opts, size, weight });
    }

    function wrapText(text, maxWidth, size = 18, weight = '400') {
      setFont(size, weight);
      const src = String(text || '').trim();
      if (!src) return [''];
      const paragraphs = src.split(/\n+/);
      const lines = [];

      for (const paragraph of paragraphs) {
        const words = paragraph.replace(/\s+/g, ' ').trim().split(' ');
        let line = '';
        for (const word of words) {
          const test = line ? `${line} ${word}` : word;
          if (ctx.measureText(test).width <= maxWidth || !line) {
            line = test;
          } else {
            lines.push(line);
            line = word;
          }
        }
        if (line) lines.push(line);
      }

      return lines;
    }

    function getWrappedLinesFitting(text, maxWidth, maxLines, startSize, minSize, weight = '400') {
      let size = startSize;
      let lines = wrapText(text, maxWidth, size, weight);

      while (lines.length > maxLines && size > minSize) {
        size -= 0.5;
        lines = wrapText(text, maxWidth, size, weight);
      }

      if (lines.length > maxLines) {
        lines = lines.slice(0, maxLines);
        const last = lines[maxLines - 1];
        let trimmed = last;
        setFont(size, weight);
        while (trimmed.length > 4 && ctx.measureText(trimmed + '…').width > maxWidth) {
          trimmed = trimmed.slice(0, -1);
        }
        lines[maxLines - 1] = trimmed + '…';
      }

      return { lines, size };
    }

    function drawWrapped(text, x, y, maxWidth, lineHeight, opts = {}) {
      const lines = wrapText(text, maxWidth, opts.size || 18, opts.weight || '400');
      lines.forEach((line, i) => drawText(line, x, y + i * lineHeight, opts));
      return y + lines.length * lineHeight;
    }

    function drawWrappedFitted(text, x, y, maxWidth, maxLines, startSize, minSize, lineHeightFactor, weight = '400') {
      const fit = getWrappedLinesFitting(text, maxWidth, maxLines, startSize, minSize, weight);
      const lineHeight = fit.size * lineHeightFactor;
      fit.lines.forEach((line, i) => drawText(line, x, y + i * lineHeight, { size: fit.size, weight }));
      return y + fit.lines.length * lineHeight;
    }

    function drawCenteredLines(lines, y, size, weight = '700') {
      for (const line of lines) {
        drawText(line, canvas.width / 2, y, { size, weight, align: 'center' });
        y += size * 1.25;
      }
      return y;
    }

      function text(value, x, y, opts = {}) {
        f(opts.size || 12, opts.weight || '400', opts.italic || false);

      function wrap(value, maxWidth, size = 12, weight = '400') {
        f(size, weight);
        const src = String(value || '').replace(/\s+/g, ' ').trim();
        if (!src) return [''];
        const words = src.split(' ');
        const lines = [];
        let current = '';
        for (const word of words) {
          const test = current ? `${current} ${word}` : word;
          if (ctx.measureText(test).width <= maxWidth || !current) current = test;
          else { lines.push(current); current = word; }

        if (current) lines.push(current);
        return lines;

      function wrapped(value, x, y, maxWidth, lineHeight, opts = {}) {
        const size = opts.size || 12;
        const weight = opts.weight || '400';
        const lines = wrap(value, maxWidth, size, weight);
        lines.forEach((ln, i) => text(ln, x, y + i * lineHeight, opts));
        return y + lines.length * lineHeight;

      function fitWrapped(value, x, y, maxWidth, maxLines, startSize, minSize, lineHeightFactor, weight = '400') {
        let size = startSize;
        let lines = wrap(value, maxWidth, size, weight);
        while (lines.length > maxLines && size > minSize) {
          size -= 0.5;
          lines = wrap(value, maxWidth, size, weight);
        }
        if (lines.length > maxLines) {
          lines = lines.slice(0, maxLines);
          let last = lines[maxLines - 1];
          f(size, weight);
          while (last.length > 4 && ctx.measureText(last + '…').width > maxWidth) last = last.slice(0, -1);
          lines[maxLines - 1] = last + '…';
        }
        const lh = size * lineHeightFactor;
        lines.forEach((ln, i) => text(ln, x, y + i * lh, { size, weight }));

    function makePdfFromJpegDataUrl(jpegDataUrl, width, height) {
      const jpegBinary = atob(jpegDataUrl.split(',')[1]);
      const imgBytes = new Uint8Array(jpegBinary.length);
      for (let i = 0; i < jpegBinary.length; i++) imgBytes[i] = jpegBinary.charCodeAt(i);

      const pageW = 595.28;
      const pageH = 841.89;
      const parts = [];
      const offsets = [];
      let length = 0;

      function addString(str) {
        const bytes = new TextEncoder().encode(str);
        parts.push(bytes);
        length += bytes.length;
      }

      function addBytes(bytes) {
        parts.push(bytes);
        length += bytes.length;
      }

      function obj(n, bodyFn) {
        offsets[n] = length;
        addString(`${n} 0 obj\n`);
        bodyFn();
        addString('\nendobj\n');
      }

      addString('%PDF-1.4\n%\xE2\xE3\xCF\xD3\n');
      obj(1, () => addString('<< /Type /Catalog /Pages 2 0 R >>'));
      obj(2, () => addString('<< /Type /Pages /Kids [3 0 R] /Count 1 >>'));
      obj(3, () => addString(`<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${pageW} ${pageH}] /Resources << /XObject << /Im0 4 0 R >> >> /Contents 5 0 R >>`));
      obj(4, () => {
        addString(`<< /Type /XObject /Subtype /Image /Width ${width} /Height ${height} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${imgBytes.length} >>\nstream\n`);
        addBytes(imgBytes);
        addString('\nendstream');
      });
      const content = `q\n${pageW} 0 0 ${pageH} 0 0 cm\n/Im0 Do\nQ`;
      obj(5, () => addString(`<< /Length ${content.length} >>\nstream\n${content}\nendstream`));
      const xrefOffset = length;
      addString('xref\n0 6\n0000000000 65535 f \n');
      for (let i = 1; i <= 5; i++) addString(String(offsets[i]).padStart(10, '0') + ' 00000 n \n');
      addString(`trailer\n<< /Size 6 /Root 1 0 R >>\nstartxref\n${xrefOffset}\n%%EOF`);
      return new Blob(parts, { type: 'application/pdf' });
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 800);
    }

    function downloadPdf() {
      render();
      const jpeg = canvas.toDataURL('image/jpeg', 0.96);

      const contract = v('contractNumber', 'akt').replace(/[^a-zA-Z0-9а-яА-Я._-]/g, '_');
      downloadBlob(pdfBlob, `akt_${contract}.pdf`);
    }



    function xmlEscape(value) {
      return String(value ?? '').replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&apos;'
      }[char]));
    }

    function safeFilePart(value, fallback = 'akt') {
      return String(value || fallback).trim().replace(/[^a-zA-Z0-9а-яА-Я._-]/g, '_') || fallback;
    }

    function makeCrcTable() {
      const table = new Uint32Array(256);
      for (let n = 0; n < 256; n++) {
        let c = n;
        for (let k = 0; k < 8; k++) c = (c & 1) ? (0xedb88320 ^ (c >>> 1)) : (c >>> 1);
        table[n] = c >>> 0;
      }
      return table;
    }

    const crcTable = makeCrcTable();

    function crc32(bytes) {
      let c = 0xffffffff;
      for (let i = 0; i < bytes.length; i++) c = crcTable[(c ^ bytes[i]) & 0xff] ^ (c >>> 8);
      return (c ^ 0xffffffff) >>> 0;
    }

    function dosDateTime(date = new Date()) {
      const time = (date.getHours() << 11) | (date.getMinutes() << 5) | Math.floor(date.getSeconds() / 2);
      const day = Math.max(1, date.getDate());
      const month = date.getMonth() + 1;
      const year = Math.max(1980, date.getFullYear()) - 1980;
      return { time, date: (year << 9) | (month << 5) | day };
    }

    function pushU16(arr, value) { arr.push(value & 255, (value >>> 8) & 255); }
    function pushU32(arr, value) { arr.push(value & 255, (value >>> 8) & 255, (value >>> 16) & 255, (value >>> 24) & 255); }

    function makeZip(files) {
      const encoder = new TextEncoder();
      const chunks = [];
      const central = [];
      let offset = 0;
      const stamp = dosDateTime();

      files.forEach(file => {
        const nameBytes = encoder.encode(file.name);
        const dataBytes = encoder.encode(file.content);
        const crc = crc32(dataBytes);
        const local = [];
        pushU32(local, 0x04034b50);
        pushU16(local, 20);
        pushU16(local, 0x0800);
        pushU16(local, 0);
        pushU16(local, stamp.time);
        pushU16(local, stamp.date);
        pushU32(local, crc);
        pushU32(local, dataBytes.length);
        pushU32(local, dataBytes.length);
        pushU16(local, nameBytes.length);
        pushU16(local, 0);
        chunks.push(new Uint8Array(local), nameBytes, dataBytes);

        const c = [];
        pushU32(c, 0x02014b50);
        pushU16(c, 20);
        pushU16(c, 20);
        pushU16(c, 0x0800);
        pushU16(c, 0);
        pushU16(c, stamp.time);
        pushU16(c, stamp.date);
        pushU32(c, crc);
        pushU32(c, dataBytes.length);
        pushU32(c, dataBytes.length);
        pushU16(c, nameBytes.length);
        pushU16(c, 0);
        pushU16(c, 0);
        pushU16(c, 0);
        pushU16(c, 0);
        pushU32(c, 0);
        pushU32(c, offset);
        central.push(new Uint8Array(c), nameBytes);
        offset += local.length + nameBytes.length + dataBytes.length;
      });

      const centralOffset = offset;
      const centralSize = central.reduce((sum, part) => sum + part.length, 0);
      const end = [];
      pushU32(end, 0x06054b50);
      pushU16(end, 0);
      pushU16(end, 0);
      pushU16(end, files.length);
      pushU16(end, files.length);
      pushU32(end, centralSize);
      pushU32(end, centralOffset);
      pushU16(end, 0);
      return new Blob([...chunks, ...central, new Uint8Array(end)], { type: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
    }

    function wText(value) {
      return `<w:r><w:t xml:space="preserve">${xmlEscape(value)}</w:t></w:r>`;
    }

    function wRun(value, bold = false) {
      return `<w:r>${bold ? '<w:rPr><w:b/></w:rPr>' : ''}<w:t xml:space="preserve">${xmlEscape(value)}</w:t></w:r>`;
    }

    function wRunStyled(value, opts = {}) {
      const size = opts.size || 22;
      const bold = opts.bold ? '<w:b/>' : '';
      const underline = opts.underline ? '<w:u w:val="single"/>' : '';
      return `<w:r><w:rPr><w:rFonts w:ascii="Tahoma" w:hAnsi="Tahoma" w:cs="Tahoma"/><w:sz w:val="${size}"/><w:szCs w:val="${size}"/>${bold}${underline}</w:rPr><w:t xml:space="preserve">${xmlEscape(value)}</w:t></w:r>`;
    }

    function wParagraphRuns(runs, opts = {}) {
      const align = opts.align ? `<w:jc w:val="${opts.align}"/>` : '';
      const spacing = `<w:spacing w:before="${opts.before || 0}" w:after="${opts.after ?? 80}" w:line="${opts.line || 240}" w:lineRule="auto"/>`;
      const indent = opts.indent ? `<w:ind w:firstLine="${opts.indent}"/>` : '';
      return `<w:p><w:pPr>${align}${spacing}${indent}</w:pPr>${runs.join('')}</w:p>`;
    }

    function wParagraph(text, opts = {}) {
      const align = opts.align ? `<w:jc w:val="${opts.align}"/>` : '';
      const spacing = `<w:spacing w:before="${opts.before || 0}" w:after="${opts.after ?? 80}" w:line="${opts.line || 240}" w:lineRule="auto"/>`;
      const indent = opts.indent ? `<w:ind w:firstLine="${opts.indent}"/>` : '';
      const size = opts.size || 22;
      const bold = opts.bold ? '<w:b/>' : '';
      const children = String(text || '').split('\n').map((part, i) => `${i ? '<w:br/>' : ''}<w:t xml:space="preserve">${xmlEscape(part)}</w:t>`).join('');
      return `<w:p><w:pPr>${align}${spacing}${indent}<w:rPr><w:rFonts w:ascii="Tahoma" w:hAnsi="Tahoma" w:cs="Tahoma"/><w:sz w:val="${size}"/><w:szCs w:val="${size}"/>${bold}</w:rPr></w:pPr><w:r><w:rPr><w:rFonts w:ascii="Tahoma" w:hAnsi="Tahoma" w:cs="Tahoma"/><w:sz w:val="${size}"/><w:szCs w:val="${size}"/>${bold}</w:rPr>${children}</w:r></w:p>`;
    }

    function lineCell(text = '', width = 2500, align = 'center') {
      return `<w:tc><w:tcPr><w:tcW w:w="${width}" w:type="dxa"/><w:tcBorders><w:top w:val="nil"/><w:left w:val="nil"/><w:bottom w:val="single" w:sz="8" w:space="0" w:color="000000"/><w:right w:val="nil"/></w:tcBorders></w:tcPr>${wParagraph(text, { align, after: 0, line: 220, size: 22 })}</w:tc>`;
    }

    function plainCell(content, width, align = 'left') {
      const body = Array.isArray(content) ? content.join('') : wParagraph(content, { align, after: 0, line: 220, size: 22 });

    function binaryFromBase64(b64) {
      const bin = atob(b64);
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      return bytes;
    }

    function excelSerialFromIso(value) {
      if (!value) return '';
      const [year, month, day] = value.split('-').map(Number);
      if (!year || !month || !day) return '';
      const utc = Date.UTC(year, month - 1, day);
      const excelEpoch = Date.UTC(1899, 11, 30);
      return Math.round((utc - excelEpoch) / 86400000);
    }

    function makeZipBinary(files) {
      const encoder = new TextEncoder();
      const chunks = [];
      const central = [];
      let offset = 0;
      const stamp = dosDateTime();
      files.forEach(file => {
        const nameBytes = encoder.encode(file.name);
        const dataBytes = file.data instanceof Uint8Array ? file.data : encoder.encode(String(file.data || ''));
        const crc = crc32(dataBytes);
        const local = [];
        pushU32(local, 0x04034b50);
        pushU16(local, 20);
        pushU16(local, 0x0800);
        pushU16(local, 0);
        pushU16(local, stamp.time);
        pushU16(local, stamp.date);
        pushU32(local, crc);
        pushU32(local, dataBytes.length);
        pushU32(local, dataBytes.length);
        pushU16(local, nameBytes.length);
        pushU16(local, 0);
        chunks.push(new Uint8Array(local), nameBytes, dataBytes);
        const c = [];
        pushU32(c, 0x02014b50);
        pushU16(c, 20);
        pushU16(c, 20);
        pushU16(c, 0x0800);
        pushU16(c, 0);
        pushU16(c, stamp.time);
        pushU16(c, stamp.date);
        pushU32(c, crc);
        pushU32(c, dataBytes.length);
        pushU32(c, dataBytes.length);
        pushU16(c, nameBytes.length);
        pushU16(c, 0);
        pushU16(c, 0);
        pushU16(c, 0);
        pushU16(c, 0);
        pushU32(c, 0);
        pushU32(c, offset);
        central.push(new Uint8Array(c), nameBytes);
        offset += local.length + nameBytes.length + dataBytes.length;
      });
      const centralOffset = offset;
      const centralSize = central.reduce((sum, part) => sum + part.length, 0);
      const end = [];
      pushU32(end, 0x06054b50);
      pushU16(end, 0);
      pushU16(end, 0);
      pushU16(end, files.length);
      pushU16(end, files.length);
      pushU32(end, centralSize);
      pushU32(end, centralOffset);
      pushU16(end, 0);
      return new Blob([...chunks, ...central, new Uint8Array(end)], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    }

    function setCellInlineString(sheetXml, ref, value) {
      const safe = xmlEscape(value);
      const re = new RegExp(`<c r="${ref}"[^>]*>.*?<\\/c>`, 's');
      return sheetXml.replace(re, match => {
        const style = (match.match(/\ss="[^"]+"/) || [''])[0];
        return `<c r="${ref}"${style} t="inlineStr"><is><t xml:space="preserve">${safe}</t></is></c>`;
      });
    }

    function setCellNumber(sheetXml, ref, value) {
      const re = new RegExp(`<c r="${ref}"[^>]*>.*?<\\/c>`, 's');
      return sheetXml.replace(re, match => {
        const style = (match.match(/\ss="[^"]+"/) || [''])[0];
        return `<c r="${ref}"${style}><v>${value}</v></c>`;
      });
    }

    function makeXlsxFromTemplateBlob() {
      const ex = getExecutor();
      const total = round2(parseAmount(fields.amount.value));
      const vat = calculateVatIncluded(total, ex.vatRate);
      const signer = typeof ex.signName === 'function' ? ex.signName() : ex.signName;
      const customerName = v('customerName', '________________');
      const contractNo = v('contractNumber', '________');
      const contractDate = dateRu(fields.contractDate.value);
      const actDateSerial = excelSerialFromIso(fields.actDate.value);
      const customer = v('customer', '________________');
      const files = XLSX_TEMPLATE_ENTRIES.map(entry => ({ name: entry.name, data: binaryFromBase64(entry.b64) }));
      const sheetFile = files.find(file => file.name === 'xl/worksheets/sheet1.xml');
      let sheetXml = new TextDecoder('utf-8').decode(sheetFile.data);
      const intro = `               Мы, нижеподписавшиеся, ${ex.intro()}, с одной стороны, и представитель Заказчика, ${v('customerPosition', '________________')} ${customer} ${customerName}, действующий на основании ${v('customerBasis', '________________')}, с другой стороны, составили настоящий Акт в том, что в соответствии с договором №${contractNo} от ${contractDate} г.`;
      const money = `${moneyWordsExcel(total)}, в том числе НДС ${ex.vatRate}% - ${moneyWordsExcel(vat)}`;
      const replacements = {
        A1: 'АКТ сдачи-приемки оказанных услуг',
        A2: `по договору №${contractNo} от ${contractDate} г. между`,
        A3: ex.headerName,
        A4: ex.genderLine,
        A5: `${customer},`,
        A6: 'именуемым в дальнейшем «Заказчик» ',
        A8: v('city', '________________'),
        A11: intro,
        A18: 'Исполнитель                            оказал',
        A23: v('serviceName', '________________'),
        C34: v('servicePlace', '________________'),
        B37: 'отсутствуют',
        A43: money,
        E54: `/${customerName}/`,
        J54: `/${signer}/`
      };
      Object.keys(replacements).forEach(ref => {
        sheetXml = setCellInlineString(sheetXml, ref, replacements[ref]);
      });
      sheetXml = setCellInlineString(sheetXml, 'I8', dateRu(fields.actDate.value));
      sheetFile.data = new TextEncoder().encode(sheetXml);
      const workbookFile = files.find(file => file.name === 'xl/workbook.xml');
      if (workbookFile) {
        let workbookXml = new TextDecoder('utf-8').decode(workbookFile.data);
        workbookXml = workbookXml.replace(/<sheet\s+name="[^"]*"/, '<sheet name="Акт"');
        workbookXml = workbookXml.replace(/<workbookView([^>]*)\/>/, (match, attrs) => {
          let clean = attrs.replace(/\sactiveTab="[^"]*"/g, '').replace(/\sfirstSheet="[^"]*"/g, '');
          return `<workbookView${clean} activeTab="0" firstSheet="0"/>`;
        });
        workbookFile.data = new TextEncoder().encode(workbookXml);
      }

      const appFile = files.find(file => file.name === 'docProps/app.xml');
      if (appFile) {
        let appXml = new TextDecoder('utf-8').decode(appFile.data);
        appXml = appXml.replace(/<TitlesOfParts><vt:vector size="1" baseType="lpstr"><vt:lpstr>.*?<\/vt:lpstr><\/vt:vector><\/TitlesOfParts>/s, '<TitlesOfParts><vt:vector size="1" baseType="lpstr"><vt:lpstr>Акт</vt:lpstr></vt:vector></TitlesOfParts>');
        appFile.data = new TextEncoder().encode(appXml);
      }
      return makeZipBinary(files);
    }

    function downloadXlsx() {
      render();
      const xlsxBlob = makeXlsxFromTemplateBlob();
      const contract = safeFilePart(v('contractNumber', 'akt'));
      const customer = safeFilePart(v('customer', 'zakazchik'));
      downloadBlob(xlsxBlob, `Акт_${contract}_${customer}.xlsx`);
    }

    function resetForm() {
      localStorage.removeItem(storageKey);
      hasUserInput = false;
      Object.keys(fields).forEach(key => {
        if (fields[key].tagName === 'SELECT') fields[key].selectedIndex = 0;
        else fields[key].value = '';
      });
      render();
    }

    Object.values(fields).forEach(field => {
      field.addEventListener('input', () => {
        hasUserInput = true;
        render();
      });
      field.addEventListener('change', () => {
        hasUserInput = true;
        render();
      });
    });

    document.getElementById('downloadXlsxBtn').addEventListener('click', downloadXlsx);
    document.getElementById('resetBtn').addEventListener('click', resetForm);

    loadSettings();
    render();
  </script>
